# Rate limiting configuration

# Define rate limit zones
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=download_limit:10m rate=20r/s;

# Status codes for rate limit
limit_req_status 429;

# Connection limiting zones
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Define connection limits
limit_conn addr 10;

# Customizable burst settings for different zones
# Note: These are applied per-location below
