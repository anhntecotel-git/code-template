# Gzip compression configuration

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/rss+xml
    application/atom+xml
    image/svg+xml
    text/x-component
    text/x-cross-domain-policy
    text/x-js-tpl
    text/richtext
    text/xsd
    text/xsl
    application/xhtml+xml
    application/vnd.mozilla.xul+xml
    application/x-font
    application/x-font-ttf
    application/x-font-opentype
    application/x-font-woff
    application/x-font-woff2
    application/vnd.ms-fontobject
    application/x-ms-woff
    application/font
    application/font-sfnt
    application/font-woff;

gzip_buffers 16 8k;
gzip_buffer_size 32k;
gzip_min_length 256;
gzip_disable "msie6";

# Disable gzip for IE6 and below
gzip_disable "MSIE [1-6]\.(?!.*SV1)";
