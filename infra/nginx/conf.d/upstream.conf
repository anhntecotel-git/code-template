# Upstream definitions for load balancing

# Backend API upstream (Java/Spring Boot)
upstream backend_api {
    # Load balancing method: least_conn spreads requests to the server with least connections
    least_conn;

    # Backend servers - can be multiple for load balancing
    server backend:8080 weight=1 max_fails=3 fail_timeout=30s;
    # server backend2:8080 weight=1 max_fails=3 fail_timeout=30s;
    # server backend3:8080 weight=1 max_fails=3 fail_timeout=30s;

    # Health check
    check interval=3000 rise=2 fall=5 timeout=1000 type=http;
    check_http_send "GET /actuator/health HTTP/1.0\r\n\r\n";
    check_http_expect_alive http_2xx;

    # Connection pooling
    keepalive 32;
}

# PostgreSQL upstream (if using PgBouncer or connection pool)
upstream postgres_pool {
    server postgres:5432;
    # server postgres-replica:5432;
    keepalive 16;
}

# Redis upstream (for session store)
upstream redis_cache {
    server redis:6379;
    keepalive 32;
}

# Alternative: Hash-based upstream for session persistence
upstream backend_api_hash {
    hash $cookie_sessionid;
    
    server backend:8080 max_fails=3 fail_timeout=30s;
    # server backend2:8080 max_fails=3 fail_timeout=30s;
    # server backend3:8080 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
}

# Alternative: IP hash for session persistence
upstream backend_api_ip_hash {
    ip_hash;
    
    server backend:8080 max_fails=3 fail_timeout=30s;
    # server backend2:8080 max_fails=3 fail_timeout=30s;
    # server backend3:8080 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
}
