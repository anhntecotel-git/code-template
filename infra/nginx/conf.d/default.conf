# ECOTEL Application - Nginx Configuration
# Reverse Proxy | Web Server | Load Balancer
# 
# Architecture Flow:
# User -> Nginx (Reverse Proxy) -> Frontend React (served by Nginx)
#                               -> Backend API (proxied to Java/Spring Boot)
#                                             -> PostgreSQL

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Client body size limit
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    # Enable HTTP/2 where applicable
    http2_max_field_size 16k;
    http2_max_header_size 32k;

    ################################################################################
    # SECTION 1: FRONTEND - React Application (Web Server)
    ################################################################################
    
    # Root location - serve React app
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # SPA routing - all non-file requests -> index.html
        try_files $uri $uri/ /index.html;
        
        # Cache control - don't cache HTML (SPA shell)
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    ################################################################################
    # SECTION 2: STATIC ASSETS - JavaScript, CSS, Images (1 year caching)
    ################################################################################
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    ################################################################################
    # SECTION 3: API REVERSE PROXY - Forward to Backend Service
    ################################################################################
    
    # API endpoint - proxy to backend service
    location /api/ {
        # Rate limiting for API
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn addr 5;

        # Reverse proxy target
        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # Preserve original request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Connection management
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header Keep-Alive timeout=5, max=100;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Error handling
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # Caching API responses (GET requests only)
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $http_cache_control;
        proxy_no_cache $http_pragma $http_authorization;
        
        # Add cache status header
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Login endpoint - higher rate limiting
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=2 nodelay;
        limit_conn addr 2;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # No caching for login
        proxy_cache off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # Upload endpoint - rate limited
    location /api/v1/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        limit_conn addr 3;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # No caching for uploads
        proxy_cache off;
    }

    # Download endpoint - higher rate limit
    location /api/v1/download {
        limit_req zone=download_limit burst=20 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Cache downloads temporarily
        proxy_cache api_cache;
        proxy_cache_valid 200 1h;
    }

    ################################################################################
    # SECTION 4: HEALTH CHECK & MONITORING
    ################################################################################
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Nginx status
    location /nginx-status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }

    # Metrics for Prometheus
    location /metrics {
        proxy_pass http://backend_api;
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        # Add your monitoring IPs here
        # allow 10.0.0.0/8;
        deny all;
    }

    ################################################################################
    # SECTION 5: ERROR PAGES
    ################################################################################
    
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

    location = /404.html {
        root /usr/share/nginx/html;
    }

    ################################################################################
    # SECTION 6: SECURITY & RESTRICTIONS
    ################################################################################
    
    # Deny access to sensitive files
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to PHP execution (security)
    location ~ \.php$ {
        deny all;
    }

    ################################################################################
    # SECTION 7: LOGGING
    ################################################################################
    
    # API logs
    location ~ ^/api/ {
        access_log /var/log/nginx/api_access.log main;
    }

    # Frontend logs
    location ~ \.(js|css|html)$ {
        access_log /var/log/nginx/frontend_access.log main;
    }
}

