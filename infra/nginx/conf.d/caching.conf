# Caching configuration

# Proxy cache paths
proxy_cache_path /var/cache/nginx/http_cache levels=1:2 keys_zone=http_cache:10m max_size=1g inactive=60m use_temp_path=off;
proxy_cache_path /var/cache/nginx/api_cache levels=1:2 keys_zone=api_cache:10m max_size=500m inactive=30m use_temp_path=off;
proxy_cache_path /var/cache/nginx/static_cache levels=1:2 keys_zone=static_cache:10m max_size=500m inactive=30d use_temp_path=off;

# Cache lock - prevent thundering herd
proxy_cache_lock on;
proxy_cache_lock_timeout 10s;

# Cache settings
proxy_cache_valid 200 10m;
proxy_cache_valid 404 1m;
proxy_cache_valid 500 502 503 504 1m;

# Cache bypass conditions
map $request_method $skip_cache {
    default 1;
    GET 0;
    HEAD 0;
}

map $query_string $skip_cache_query {
    default 1;
    "" 0;
}

# Add cache status header
add_header X-Cache-Status $upstream_cache_status;
