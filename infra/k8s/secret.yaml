---
# Backend Secret - Database & Security Credentials
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: ecotel
  labels:
    app: backend
type: Opaque
stringData:
  # Database Credentials
  SPRING_DATASOURCE_USERNAME: "ecotel_user"
  SPRING_DATASOURCE_PASSWORD: "change-me-in-production"
  
  # JWT Configuration
  APP_JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production-min-32-chars"
  APP_JWT_ISSUER: "ecotel-app"
  
  # Mail Configuration (if needed)
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_USERNAME: "your-email@gmail.com"
  MAIL_PASSWORD: "your-app-password"
  MAIL_FROM: "noreply@ecotel.com"
  
  # AWS Credentials (if using AWS)
  AWS_ACCESS_KEY_ID: "your-aws-access-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
  AWS_REGION: "ap-southeast-1"
  
  # Payment Gateway (if needed)
  PAYMENT_GATEWAY_KEY: "your-payment-gateway-key"
  PAYMENT_GATEWAY_SECRET: "your-payment-gateway-secret"
  
  # API Keys
  EXTERNAL_API_KEY: "your-external-api-key"

---
# PostgreSQL Secret
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ecotel
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres-password-change-me"
  POSTGRES_USER: "ecotel_user"
  POSTGRES_DB: "ecotel_db"

---
# Redis Secret (if auth enabled)
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: ecotel
  labels:
    app: redis
type: Opaque
stringData:
  REDIS_PASSWORD: "redis-password-change-me"

