---
# Image Pull Secret (for private Docker Registry)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: ecotel
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: |
    {
      "docker.io": {
        "username": "your-docker-username",
        "password": "your-docker-password",
        "email": "your-email@example.com",
        "auth": "your-base64-encoded-credentials"
      }
    }

---
# Database Backup Secret (for S3 or Cloud Storage)
apiVersion: v1
kind: Secret
metadata:
  name: backup-secret
  namespace: ecotel
  labels:
    app: backup
type: Opaque
stringData:
  # AWS S3
  BACKUP_AWS_ACCESS_KEY: "your-backup-access-key"
  BACKUP_AWS_SECRET_KEY: "your-backup-secret-key"
  BACKUP_S3_BUCKET: "ecotel-backups"
  BACKUP_S3_REGION: "ap-southeast-1"
  
  # Or GCS
  BACKUP_GCS_PROJECT: "your-gcp-project"
  BACKUP_GCS_BUCKET: "ecotel-backups"
  BACKUP_GCS_KEY: "your-gcp-key-json"

---
# Monitoring Secret (for Prometheus/Grafana)
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secret
  namespace: ecotel
  labels:
    app: monitoring
type: Opaque
stringData:
  # Grafana
  GRAFANA_ADMIN_USER: "admin"
  GRAFANA_ADMIN_PASSWORD: "change-me-in-production"
  
  # Prometheus
  PROMETHEUS_RETENTION: "15d"
  PROMETHEUS_SCRAPE_INTERVAL: "15s"
