---
# Backend ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ecotel
  labels:
    app: backend
data:
  # Spring Boot Configuration
  SPRING_APPLICATION_NAME: "ecotel-backend"
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_USE_SQL_COMMENTS: "true"
  
  # Datasource Configuration
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/ecotel_db"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "20000"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "300000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1200000"
  
  # Redis Configuration
  SPRING_REDIS_HOST: "redis"
  SPRING_REDIS_PORT: "6379"
  SPRING_REDIS_TIMEOUT: "60000ms"
  SPRING_REDIS_JEDIS_POOL_MAX_ACTIVE: "20"
  SPRING_REDIS_JEDIS_POOL_MAX_IDLE: "10"
  SPRING_REDIS_JEDIS_POOL_MIN_IDLE: "5"
  
  # Server Configuration
  SERVER_PORT: "8080"
  SERVER_SERVLET_CONTEXT_PATH: "/"
  SERVER_ERROR_INCLUDE_MESSAGE: "always"
  SERVER_ERROR_INCLUDE_BINDING_ERRORS: "always"
  SERVER_ERROR_INCLUDE_STACKTRACE: "on_param"
  SERVER_COMPRESSION_ENABLED: "true"
  SERVER_COMPRESSION_MIN_RESPONSE_SIZE: "1024"
  SERVER_COMPRESSION_MIME_TYPES: "text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json"
  
  # Logging Configuration
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_ECOTEL: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "DEBUG"
  LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
  LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  LOGGING_FILE_NAME: "/app/logs/application.log"
  LOGGING_FILE_MAX_SIZE: "10MB"
  LOGGING_FILE_MAX_HISTORY: "30"
  
  # Management Endpoints
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,metrics,prometheus,info"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "when-authorized"
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
  
  # CORS Configuration
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,https://ecotel.example.com"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
  CORS_ALLOWED_HEADERS: "Content-Type,Authorization,X-Requested-With"
  CORS_ALLOW_CREDENTIALS: "true"
  
  # Application Configuration
  APP_NAME: "ECOTEL Application"
  APP_VERSION: "1.0.0"
  APP_ENVIRONMENT: "production"
  APP_JWT_EXPIRATION: "86400000"  # 24 hours in ms
  APP_JWT_REFRESH_EXPIRATION: "604800000"  # 7 days in ms
  APP_MAX_FILE_SIZE: "5242880"  # 5MB in bytes
  APP_ALLOWED_FILE_TYPES: "pdf,doc,docx,xlsx,csv"

---
# Frontend ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: ecotel
  labels:
    app: frontend
data:
  # React Environment Variables
  REACT_APP_API_URL: "https://api.ecotel.example.com"
  REACT_APP_ENV: "production"
  REACT_APP_DEBUG: "false"
  REACT_APP_VERSION: "1.0.0"
  REACT_APP_NAME: "ECOTEL App"
  REACT_APP_TIMEOUT: "30000"
  REACT_APP_MAX_RETRIES: "3"

---
# Frontend Nginx ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: ecotel
  labels:
    app: frontend
data:
  default.conf: |
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Use zone defined above
        limit_req zone=general burst=20 nodelay;

        root /usr/share/nginx/html;
        index index.html;

        # Static assets caching (1 year)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # API proxy to backend
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # SPA routing - serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to sensitive files
        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

---
# Database ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: ecotel
  labels:
    app: postgres
data:
  POSTGRES_DB: "ecotel_db"
  POSTGRES_INITDB_ARGS: "-c max_connections=100 -c shared_buffers=256MB -c effective_cache_size=1GB"

---
# Redis ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: ecotel
  labels:
    app: redis
data:
  redis.conf: |
    # Redis Configuration
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    timeout 0
    tcp-backlog 511
    tcp-keepalive 300
    loglevel notice
    databases 16
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    slowlog-log-slower-than 10000
    slowlog-max-len 128
